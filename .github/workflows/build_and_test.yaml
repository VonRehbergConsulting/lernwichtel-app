name: Build and test

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: "stable"
          cache: true

      - name: Setup project
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build APK (Kompiliert die App gegen Android)
        run: flutter build apk --debug

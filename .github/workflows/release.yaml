name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # 1) semantic-release: ermittelt aus den Conventional Commits die naechste
  #    Version, bumpt die pubspec, schreibt CHANGELOG.md, taggt und legt ein
  #    GitHub-Release an. Danach werden die Release-Aenderungen nach develop
  #    zurueckgefuehrt.
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"
    outputs:
      released: ${{ steps.check.outputs.released }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: npx semantic-release

      - name: Check whether a release was published
        id: check
        run: |
          if git log -1 --pretty=%B | grep -q "chore(release):"; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge back to develop
        if: steps.check.outputs.released == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase false
          git config merge.ff false
          git fetch origin develop
          git checkout develop
          git merge --no-ff main -m "chore: merge release changes back to develop [skip ci]"
          git push origin develop

  # 2) Automatischer Upload in die Test-Spuren (Play „internal" + TestFlight).
  #    Laeuft nur, wenn tatsaechlich eine neue Version veroeffentlicht wurde.
  deploy-android:
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/deploy-android.yaml
    secrets: inherit

  deploy-ios:
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/deploy-ios.yaml
    secrets: inherit
